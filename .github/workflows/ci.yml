name: CI Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  APP_NAME: "IP-Quality-Checker"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
            arch: x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos
            arch: arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
            arch: x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Get date
        id: date
        shell: bash
        run: echo "stamp=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ matrix.label }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.label }}-cargo-

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ""
          updaterJsonPreferNsis: false
          args: --target ${{ matrix.target }}

      - name: Collect & rename artifacts
        id: collect
        shell: bash
        run: |
          ARTIFACTS=""
          shopt -s nullglob
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi \
                   src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe \
                   src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg \
                   src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb \
                   src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage; do
            [ -f "$f" ] || continue
            EXT="${f##*.}"
            NEW="${{ env.APP_NAME }}-${{ matrix.label }}-${{ matrix.arch }}-${{ steps.date.outputs.stamp }}.${EXT}"
            cp "$f" "$NEW"
            SIZE=$(du -h "$NEW" 2>/dev/null | cut -f1 || echo "?")
            echo "  $NEW  ($SIZE)"
            ARTIFACTS="$ARTIFACTS $NEW"
          done
          echo "files=$ARTIFACTS" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.label }}-${{ matrix.arch }}-${{ steps.date.outputs.stamp }}
          path: ${{ env.APP_NAME }}-${{ matrix.label }}-*

      - name: Release desktop assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          draft: true
          name: "IP Quality Checker ${{ github.ref_name }}"
          body: |
            ## IP Quality Checker ${{ github.ref_name }}

            ### 下载说明
            | 平台 | 文件 |
            |------|------|
            | Windows | `.msi` (安装包) / `.exe` (NSIS) |
            | macOS | `.dmg` |
            | Linux | `.AppImage` (免安装) / `.deb` (Debian系) |
            | Android | `.apk` |
          files: ${{ env.APP_NAME }}-${{ matrix.label }}-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Get date
        id: date
        shell: bash
        run: echo "stamp=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            android-cargo-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src-tauri/gen/android/.gradle
          key: gradle-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/gradle.lockfile') }}
          restore-keys: |
            gradle-

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Init Android project
        run: cargo tauri android init

      - name: Build Android APK
        run: cargo tauri android build --apk

      - name: Collect & rename APK
        id: collect
        run: |
          mkdir -p apks
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk apks/ 2>/dev/null || true
          cp src-tauri/gen/android/app/build/outputs/apk/arm64-v8a/release/*.apk apks/ 2>/dev/null || true
          cd apks
          ARTIFACTS=""
          for f in *.apk; do
            [ -f "$f" ] || continue
            SIZE=$(du -h "$f" | cut -f1)
            if echo "$f" | grep -qi "arm64"; then
              NEW="${{ env.APP_NAME }}-android-arm64-${{ steps.date.outputs.stamp }}.apk"
            else
              NEW="${{ env.APP_NAME }}-android-universal-${{ steps.date.outputs.stamp }}.apk"
            fi
            mv "$f" "$NEW"
            echo "  $NEW  ($SIZE)"
            ARTIFACTS="$ARTIFACTS $NEW"
          done
          echo "files=$ARTIFACTS" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android-${{ steps.date.outputs.stamp }}
          path: apks/*.apk

      - name: Release Android APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
